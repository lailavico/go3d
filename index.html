<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laila Vico · Redireccionando...</title>
    <script>
        // Detectar idioma del navegador y redirigir
        (function() {
            const userLang = navigator.language || navigator.userLanguage;
            const lang = userLang.split('-')[0]; // 'es' o 'en'
            
            if (lang === 'es') {
                window.location.href = 'es/';
            } else {
                window.location.href = 'en/';
            }
        })();
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(145deg, #ffffff 0%, #f9fafc 100%);
            color: #0b1a2e;
        }
        .loader {
            text-align: center;
        }
        .loader i {
            font-size: 3rem;
            color: #fbbf24;
            margin-bottom: 1rem;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="loader">
        <i class="fas fa-language"></i>
        <h2>Redirigiendo según tu idioma...</h2>
        <p>Redirecting based on your language...</p>
    </div>
</body>
</html>
